<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Safia Nassiri</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .resume-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg2);
    }
    .resume-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .resume-toolbar-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .resume-embed {
      width: 100%;
      height: 80vh;
      min-height: 600px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="cursor"></div>
  <div class="cursor-ring"></div>

  <nav>
    <a href="../index.html" class="nav-logo">Safia Nassiri<span>.</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="games.html">Games</a></li>
      <li><a href="design.html">Design</a></li>
      <li><a href="experience.html">Experience</a></li>
    </ul>
    <a href="resume.html" class="nav-resume">Resume ↗</a>
    <div class="hamburger" role="button" aria-label="Menu">
      <span></span><span></span><span></span>
    </div>
  </nav>
  <div class="mobile-menu">
    <a href="../index.html">Home</a>
    <a href="projects.html">Projects</a>

    <a href="design.html">Design</a>
    <a href="experience.html">Experience</a>
    <a href="resume.html">Resume ↗</a>
  </div>

  <section class="page-hero">
    <div class="page-hero-inner">
      <div class="section-label reveal">Document</div>
      <h1 class="reveal" style="font-size: clamp(2.2rem, 5vw, 4rem);" data-delay="80">Resume</h1>
      <div class="rule reveal" data-delay="120"></div>
    </div>
  </section>

  <section class="section">
    <div class="section-inner">
      <div class="resume-wrap reveal">
        <div class="resume-toolbar">
          <span class="resume-toolbar-label">SafiaNassiri_Resume_Fall2025.pdf</span>
          <a href="../assets/resume/SafiaNassiri_Resume_Fall2025.pdf"
              download class="btn-primary">Download PDF</a>
        </div>
        <iframe
          class="resume-embed"
          src="../assets/resume/SafiaNassiri_Resume_Fall2025.pdf"
          title="Safia Nassiri Resume"
        >
          <p style="padding:2rem;color:var(--muted);font-family:var(--mono);font-size:0.8rem;">
            Your browser doesn't support embedded PDFs.
            <a href="../assets/resume/SafiaNassiri_Resume_Fall2025.pdf"
                style="color:var(--gold);">Download the resume instead.</a>
          </p>
        </iframe>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-logo">Safia Nassiri — 2025</div>
    <div class="footer-links">
      <a href="https://github.com/safianassiri" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com/in/safianassiri" target="_blank" rel="noopener">LinkedIn</a>
